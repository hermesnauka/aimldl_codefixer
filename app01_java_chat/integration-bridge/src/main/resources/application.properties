spring.application.name=integration-bridge
server.port=${SERVER_PORT:8080}

# Secondary LLM enrichment (LangChain4jService) — optional. If unset, the service
# gracefully falls back to a plain concatenation of AST issues instead of calling an LLM.
codefixer.openai.api-key=${OPENAI_API_KEY:}
codefixer.openai.model=${OPENAI_MODEL:gpt-4o-mini}
